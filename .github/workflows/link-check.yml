name: Link Check

# Fails on broken intra-repo markdown links (enforces "point, don't copy"). Cross-repo
# pointers into the sibling repos, external URLs, and #anchors are ignored via .mlc_config.json.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.mlc_config.json'
